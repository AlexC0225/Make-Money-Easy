services:
  postgres:
    image: postgres:16-alpine
    container_name: make-money-easy-postgres
    environment:
      POSTGRES_DB: mme
      POSTGRES_USER: mme
      POSTGRES_PASSWORD: mme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mme -d mme"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: make-money-easy-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MME_APP_NAME: Make Money Easy
      MME_ENV: development
      MME_DEBUG: "true"
      MME_API_V1_PREFIX: /api/v1
      MME_DATABASE_URL: postgresql+psycopg://mme:mme@postgres:5432/mme
      MME_JOB_LOG_DIR: /app/data/logs
      MME_DEFAULT_LOT_SIZE: "1000"
      MME_DEFAULT_CASH_ALLOCATION_PCT: "10"
      MME_MAX_OPEN_POSITIONS: "20"
      MME_DEFAULT_FEE_RATE: "0.001425"
      MME_DEFAULT_TAX_RATE: "0.003"
      MME_SCHEDULER_TIMEZONE: Asia/Taipei
      MME_SCHEDULER_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: make-money-easy-scheduler
    command: ["python", "scripts/run_scheduler.py"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MME_APP_NAME: Make Money Easy
      MME_ENV: development
      MME_DEBUG: "true"
      MME_API_V1_PREFIX: /api/v1
      MME_DATABASE_URL: postgresql+psycopg://mme:mme@postgres:5432/mme
      MME_JOB_LOG_DIR: /app/data/logs
      MME_DEFAULT_LOT_SIZE: "1000"
      MME_DEFAULT_CASH_ALLOCATION_PCT: "10"
      MME_MAX_OPEN_POSITIONS: "20"
      MME_DEFAULT_FEE_RATE: "0.001425"
      MME_DEFAULT_TAX_RATE: "0.003"
      MME_SCHEDULER_TIMEZONE: Asia/Taipei
      MME_SCHEDULER_ENABLED: "true"
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: make-money-easy-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
  postgres_data:
